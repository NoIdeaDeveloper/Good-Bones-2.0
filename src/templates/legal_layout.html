<!DOCTYPE html>
<html lang="en">
<head>
{{head}}
  <link rel="stylesheet" href="{{base_path}}css/global.min.css{{cache_bust}}" />
  <link rel="alternate" type="application/atom+xml" title="The Good Bones Blog" href="{{base_path}}blog/feed.xml" />
</head>
<body class="legal-page">

{{nav}}

  <header class="legal-hero">
    <p class="eyebrow">Good Bones Web Inc.</p>
    <h1>{{page_title}}</h1>
    <p>{{intro}}</p>
    <a class="legal-hero__back" href="{{base_path}}index.html" aria-label="Back to home page">← Back to home</a>
  </header>

  <div class="legal-layout">
    <nav class="legal-toc" aria-label="On this page">
      <span class="legal-toc__title">On this page</span>
{{toc}}
    </nav>
    <main class="legal-content" id="main-content">
      <span class="legal-date">Last updated: {{date}}</span>

{{content}}

      <a class="legal-back" href="{{base_path}}index.html" aria-label="Back to home page">Back to home</a>
    </main>
  </div>

{{footer}}

  <button type="button" class="back-to-top" id="backToTop" aria-label="Back to top">
    <span aria-hidden="true">↑</span>
  </button>

  <script type="module" src="{{base_path}}script.min.js{{cache_bust}}"></script>
</body>
</html>

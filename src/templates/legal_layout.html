<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body class="legal-page">

{{nav}}

  <header class="legal-hero">
    <p class="eyebrow">Good Bones Web Inc.</p>
    <h1>{{page_title}}</h1>
    <p>{{intro}}</p>
  </header>

  <div class="legal-layout">
    <nav class="legal-toc" aria-label="On this page">

      <span class="legal-date">Last updated: {{date}}</span>

{{content}}

      <a class="legal-back" href="index.html">Back to home</a>
    </main>
  </div>

{{footer}}
</body>
</html>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <meta name="description" content="{{description}}" />
  <link rel="preload" href="fonts/bebasneue-v16-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="fonts/fonts.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦴</text></svg>" />
  <link rel="icon" type="image/png" sizes="256x256" href="favicon.png" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <meta name="theme-color" content="#FFF9F0" />
  <link rel="canonical" href="{{canonical_url}}" />
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{canonical_url}}" />
  <meta property="og:title" content="{{title}}" />
  <meta property="og:description" content="{{description}}" />
  <meta property="og:image" content="{{og_image}}" />
  <meta property="og:image:alt" content="{{og_image_alt}}" />
  <meta property="og:site_name" content="{{company}}" />
  <meta property="og:locale" content="en_CA" />
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="{{twitter_handle}}" />
  <meta name="twitter:title" content="{{title}}" />
  <meta name="twitter:description" content="{{description}}" />
  <meta name="twitter:image" content="{{og_image}}" />
  <meta name="twitter:image:alt" content="{{og_image_alt}}" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ProfessionalService",
    "name": "{{company}}",
    "url": "{{canonical_url}}",
    "logo": "{{domain}}/favicon.png",
    "image": "{{og_image}}",
    "description": "{{description}}",
    "areaServed": {
      "@type": "City",
      "name": "Edmonton",
      "containedIn": {
        "@type": "AdministrativeArea",
        "name": "Alberta"
      }
    },
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Edmonton",
      "addressRegion": "AB",
      "addressCountry": "CA"
    },
    "email": "mailto:{{email}}",
    "telephone": "{{phone_href}}",
    "priceRange": "$"
  }
  </script>
  <style>
    :root {
      --ink: #1A1A2E; --cream: #FFF9F0; --white: #FFFFFF; --yellow: #FFD93D;
      --coral: #FF6B6B; --coral-strong: #D62E2E; --teal: #4ECDC4; --violet: #9B5DE5; --violet-strong: #8A4DD6; --pink: #F15BB5;
      --mint: #CBF3F0; --peach: #FFE5D9; --radius: 22px; --radius-sm: 14px;
      --max-width: 1200px; --transition: 0.25s ease;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; scroll-padding-top: 90px; }
    body { margin: 0; font-family: "Space Grotesk", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--cream); color: var(--ink); line-height: 1.55; overflow-x: hidden; }
    .scroll-progress { position: fixed; top: 0; left: 0; height: 5px; width: 0; background: linear-gradient(90deg, var(--coral), var(--yellow), var(--teal), var(--violet)); z-index: 10000; }
    .grain { position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.045; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
    .skip-link { position: absolute; top: -100%; left: 18px; z-index: 10002; background: var(--ink); color: var(--cream); padding: 12px 18px; border-radius: var(--radius-sm); font-weight: 700; border: 3px solid var(--cream); box-shadow: 4px 4px 0 var(--yellow); transition: top 0.2s ease; }
    .skip-link:focus { top: 18px; }
    .site-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 18px 4vw; transition: background var(--transition), box-shadow var(--transition); }
    .site-nav--scrolled { background: rgba(255, 249, 240, 0.92); backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(26, 26, 46, 0.06); }
    .logo { display: inline-flex; align-items: center; gap: 10px; font-family: "Bebas Neue", sans-serif; font-size: 1.6rem; letter-spacing: 0.04em; }
    .logo .bone { display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 42px; background: var(--yellow); border-radius: 50%; font-size: 1.3rem; border: 3px solid var(--ink); transform: rotate(-12deg); }
    .menu { display: flex; align-items: center; gap: 32px; }
    .menu a { font-weight: 600; }
  </style>

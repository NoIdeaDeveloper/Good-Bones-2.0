<!DOCTYPE html>
<html lang="en">
<head>
{{head}}
  <link rel="stylesheet" href="{{base_path}}css/global.min.css{{cache_bust}}" />
  <link rel="stylesheet" href="{{base_path}}css/blog.min.css{{cache_bust}}" />
</head>
<body class="blog-page">

{{nav}}

  <header class="blog-hero">
    <div class="blog-hero__decor" aria-hidden="true">
      <span class="blog-hero__shape blog-hero__shape--one">✦</span>
      <span class="blog-hero__shape blog-hero__shape--two">●</span>
      <span class="blog-hero__shape blog-hero__shape--three">✦</span>
    </div>
    <div class="blog-hero__content">
      <p class="eyebrow">Good Bones Blog</p>
      <h1>Ideas, updates, and web wisdom</h1>
      <p>Practical thoughts on web design, performance, and growing an Edmonton business online.</p>
      <p class="blog-hero__feed"><a href="{{base_path}}blog/feed.xml" rel="alternate">RSS feed</a></p>
    </div>
  </header>

  <main class="blog-layout" id="main-content">
    <div class="blog-index">
{{featured}}
      <div class="blog-index__grid">
{{posts}}
      </div>
    </div>
  </main>

{{footer}}

  <button type="button" class="back-to-top" id="backToTop" aria-label="Back to top">
    <span aria-hidden="true">↑</span>
  </button>

  <script type="module" src="{{base_path}}script.min.js{{cache_bust}}"></script>
</body>
</html>

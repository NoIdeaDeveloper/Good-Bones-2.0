<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found (404) — Good Bones Web Inc.</title>
  <meta name="description" content="We could not find that page. Head back to Good Bones Web Inc. home." />
  <meta name="robots" content="noindex, follow" />
  <link rel="preload" href="/fonts/bebasneue-v16-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/spacegrotesk-v22-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="/fonts/fonts.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦴</text></svg>" />
  <link rel="icon" type="image/png" sizes="256x256" href="/favicon.png" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <meta name="theme-color" content="#FFF9F0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="canonical" href="https://goodbonesweb.com/404.html" />
  <style>
    :root {
      --ink: #1A1A2E; --cream: #FFF9F0; --white: #FFFFFF; --yellow: #FFD93D;
      --coral: #FF6B6B; --coral-strong: #D62E2E; --teal: #4ECDC4; --violet: #9B5DE5; --violet-strong: #8A4DD6; --pink: #F15BB5;
      --mint: #CBF3F0; --peach: #FFE5D9; --radius: 22px; --radius-sm: 14px;
      --max-width: 1200px; --transition: 0.25s ease;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; font-family: "Space Grotesk", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--cream); color: var(--ink); line-height: 1.55; min-height: 100svh; display: flex; flex-direction: column; }
    .grain { position: fixed; inset: 0; pointer-events: none; z-index: 900; opacity: 0.045; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
    .skip-link { position: absolute; top: -100%; left: 18px; z-index: 10002; background: var(--ink); color: var(--cream); padding: 12px 18px; border-radius: var(--radius-sm); font-weight: 700; border: 3px solid var(--cream); box-shadow: 4px 4px 0 var(--yellow); transition: top 0.2s ease; }
    .skip-link:focus { top: 18px; }
    .error-hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 120px 6vw; background: radial-gradient(circle at 20% 30%, rgba(255, 217, 61, 0.35) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(78, 205, 196, 0.25) 0%, transparent 40%), var(--white); border-bottom: 3px solid var(--ink); }
    .error-hero h1 { font-family: "Bebas Neue", sans-serif; font-size: clamp(6rem, 20vw, 12rem); line-height: 1; margin: 0 0 12px; letter-spacing: 0.02em; }
    .error-hero h1 span { display: inline-block; color: var(--coral); transform: rotate(-6deg); }
    .error-hero p { font-size: clamp(1.1rem, 2vw, 1.35rem); max-width: 520px; margin: 0 0 32px; }
    .error-actions { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 16px 30px; border-radius: 999px; font-weight: 700; border: 3px solid var(--ink); text-decoration: none; transition: transform var(--transition), box-shadow var(--transition), background var(--transition); }
    .btn--primary { background: var(--coral); color: var(--white); box-shadow: 6px 6px 0 var(--ink); }
    .btn--primary:hover { transform: translate(-3px, -3px); box-shadow: 9px 9px 0 var(--ink); }
    .btn--secondary { background: var(--white); color: var(--ink); }
    .btn--secondary:hover { background: var(--yellow); transform: translateY(-2px); }
    .site-footer { background: var(--ink); color: var(--cream); padding: 28px 6vw; text-align: center; border-top: 4px solid var(--ink); }
    .site-footer a { color: var(--yellow); font-weight: 700; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="grain" aria-hidden="true"></div>

  <main id="main-content" class="error-hero">
    <h1 aria-label="404 page not found"><span>4</span>0<span>4</span></h1>
    <p>Oops — that page seems to have gone missing. Maybe it moved, maybe it never existed, or maybe the dog buried it in the backyard.</p>
    <div class="error-actions">
      <a href="/index.html" class="btn btn--primary">Back to home</a>
      <a href="/index.html#contact" class="btn btn--secondary">Start a Project</a>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 2026 Good Bones Web Inc. · <a href="/index.html">Home</a></p>
  </footer>
</body>
</html>
